<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
Temperature Converter (Celsius ↔ Fahrenheit)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">


        <form action="" id="form">
            <h1>CodePen Home
Temperature Converter</h1>

<input type="number" id="input_id" placeholder="enter Celsius and Fahrenheit">


<button onclick="FFahrenheit()" type="button">Celsius to Fahrenheit</button>
<button onclick="CCelsius()" type="button">Fahrenheit to Celsius</button>

<div id="result"></div>
        </form>
    </div>


    <script src="./script.js"></script>
    
</body>
</html>
